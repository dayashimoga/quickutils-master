name: QuickUtils Network Orchestrator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Create or Update GitHub Repositories & Sync Code
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          OWNER: "dayashimoga"
          PYTHONPATH: "."
        run: |
          # Step 1: Prep project files locally
          python scripts/sync_project_scripts.py
          
          # Configure Git for syncing
          git config --global user.email "bot@quickutils.top"
          git config --global user.name "QuickUtils Bot"
          
          # Step 2: Use github_distribute.py to create repos and push code
          python scripts/github_distribute.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "latest"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init & adoption
        working-directory: terraform
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform init
          
          echo "Checking for existing Cloudflare projects and domains to import..."
          jq -r 'to_entries[] | "\(.key) \(.value.repo_name) \(.value.custom_domain)"' projects.json | while read -r key repo domain; do
            
            echo "Processing $key ($repo)..."
            
            # 1. Adopt Pages Project
            STATUS_PROJ=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$repo" \
              -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json")
              
            if [ "$STATUS_PROJ" == "200" ]; then
              if ! terraform state show "cloudflare_pages_project.quickutils_projects[\"$key\"]" > /dev/null 2>&1; then
                echo "Adopting project: $repo"
                terraform import -input=false "cloudflare_pages_project.quickutils_projects[\"$key\"]" "$ACCOUNT_ID/$repo" || echo "Import failed for project $repo"
              else
                echo "Project $repo already in state."
              fi
              
              # 2. Adopt Custom Domain (if it exists)
              if [ "$domain" != "null" ] && [ -n "$domain" ]; then
                STATUS_DOM=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$repo/domains/$domain" \
                  -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json")
                  
                if [ "$STATUS_DOM" == "200" ]; then
                  if ! terraform state show "cloudflare_pages_domain.quickutils_domains[\"$key\"]" > /dev/null 2>&1; then
                    echo "Adopting domain: $domain for $repo"
                    terraform import -input=false "cloudflare_pages_domain.quickutils_domains[\"$key\"]" "$ACCOUNT_ID/$repo/$domain" || echo "Import failed for domain $domain"
                  else
                    echo "Domain $domain already in state."
                  fi
                else
                  echo "Domain $domain not found in Cloudflare (Status: $STATUS_DOM). Terraform will create it."
                fi
              fi
            else
              echo "Project $repo not found in Cloudflare (Status: $STATUS_PROJ). Terraform will create it."
            fi
          done
          
          # Final Apply
          terraform apply -auto-approve
